<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Sjøen-Tollaksvik — CV</title>
<style>
  :root {
    --navy: #0d2438;
    --navy-light: #17324a;
    --bg: #faf9f6;
    --line: #dcd8cf;
    --text: #1a1a1a;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    position: relative;
    background: var(--navy);
    color: white;
    padding: 40px 24px 90px;
    overflow: hidden;
  }
  header .stripes {
    position: absolute;
    top: -40px;
    right: -60px;
    width: 220px;
    height: 260px;
    background: repeating-linear-gradient(
      -35deg,
      transparent 0 10px,
      rgba(255,255,255,0.06) 10px 12px
    );
  }
  header .content {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .logo-circle {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    text-align: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .org-name {
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }
  h1 {
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  p.role {
    margin-top: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 1rem;
  }
  .contact-row {
    margin-top: 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
  }

  main {
    flex: 1;
    max-width: 760px;
    width: 100%;
    margin: -50px auto 0;
    padding: 0 24px 48px;
  }
  .panel {
    background: white;
    border-radius: 10px;
    box-shadow: 0 6px 24px rgba(13,36,56,0.10);
    overflow: hidden;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    flex: 1;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.3px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .tab.active {
    color: var(--navy);
    border-bottom: 2px solid var(--navy);
  }
  iframe {
    width: 100%;
    height: 72vh;
    border: none;
    display: block;
  }
  .download-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-top: 1px solid var(--line);
    background: #fafaf8;
  }
  .download-row span {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .download-row a {
    color: var(--navy);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .download-row a:hover { text-decoration: underline; }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    header { padding: 32px 18px 80px; }
    h1 { font-size: 1.5rem; }
    iframe { height: 65vh; }
  }
</style>
</head>
<body>

<header>
  <div class="stripes"></div>
  <div class="content">
    <div class="logo-row">
      <div class="logo-circle"><img src="logo.png" alt="" onerror="this.parentElement.textContent='LOGO'"></div>
      <div class="org-name">Norges Arktiske Universitet</div>
    </div>
    <h1>Sebastian Sjøen-Tollaksvik</h1>
    <p class="role">Masterstudent, sivilingeniør KI</p>
    <div class="contact-row">
      <span>+47 404 80 782</span>
      <span>sesjo8217@uit.no</span>
    </div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="showCV('no')">Norsk CV</button>
      <button class="tab" onclick="showCV('en')">English CV</button>
    </div>
    <iframe id="cv-frame" src="cv-no.pdf"></iframe>
    <div class="download-row">
      <span>Vises ikke riktig på mobil?</span>
      <a id="cv-download" href="cv-no.pdf" download>Last ned PDF</a>
    </div>
  </div>
</main>

<footer>UiT · Norges Arktiske Universitet</footer>

<script>
  function showCV(lang) {
    const frame = document.getElementById('cv-frame');
    const download = document.getElementById('cv-download');
    const tabs = document.querySelectorAll('.tab');

    if (lang === 'no') {
      frame.src = 'cv-no.pdf';
      download.href = 'cv-no.pdf';
      download.textContent = 'Last ned PDF';
      tabs[0].classList.add('active');
      tabs[1].classList.remove('active');
    } else {
      frame.src = 'cv-en.pdf';
      download.href = 'cv-en.pdf';
      download.textContent = 'Download PDF';
      tabs[1].classList.add('active');
      tabs[0].classList.remove('active');
    }
  }
</script>

</body>
</html>
