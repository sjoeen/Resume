<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian Sjøen-Tollaksvik — CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #14273e;
    --navy-2: #1d3a5c;
    --ink: #17191c;
    --muted: #5a6570;
    --paper: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--navy);
    background-image: repeating-linear-gradient(
      -28deg,
      rgba(255,255,255,0.025) 0 2px,
      transparent 2px 14px
    );
    color: var(--ink);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .sheet {
    width: 100%;
    max-width: 980px;
    background: var(--paper);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    overflow: hidden;
  }

  /* ===== Header block, mirrors the printed business card ===== */
  .card {
    position: relative;
    padding: 48px 44px 38px;
    overflow: hidden;
    border-bottom: 1px solid #eceae4;
  }
  .band {
    position: absolute;
    top: -20%;
    right: 8%;
    width: 130px;
    height: 160%;
    background: var(--navy);
    transform: rotate(28deg);
    z-index: 0;
  }
  .band::before {
    content: "";
    position: absolute;
    top: 0; left: -46px; bottom: 0;
    width: 40px;
    background-image: repeating-linear-gradient(
      to right, #c9ccd1 0 2px, transparent 2px 9px
    );
    opacity: 0.6;
  }
  .card-inner { position: relative; z-index: 1; max-width: 500px; }

  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-ring {
    width: 46px; height: 46px; border-radius: 50%;
    border: 1.5px solid var(--navy);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .logo-ring img { width: 100%; height: 100%; object-fit: contain; }
  .org-name {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 1.4px;
    text-transform: uppercase; color: var(--navy);
  }

  h1 {
    font-size: 2.1rem; font-weight: 500; color: var(--navy);
    letter-spacing: -0.01em; margin-bottom: 14px;
  }
  .rule { width: 90px; height: 4px; background: var(--ink); margin-bottom: 18px; }

  .info-list { display: flex; flex-direction: column; gap: 10px; }
  .info-row { display: flex; align-items: center; gap: 12px; font-size: 0.96rem; color: var(--ink); }
  .info-row svg { flex-shrink: 0; stroke: var(--navy); }

  /* ===== Language / document switch ===== */
  main { padding: 36px 44px 48px; }

  .switch {
    display: inline-flex; border: 1.5px solid var(--navy);
    border-radius: 999px; padding: 3px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .switch button {
    border: none; background: none; padding: 9px 22px;
    font-family: inherit; font-size: 0.86rem; font-weight: 600;
    letter-spacing: 0.3px; color: var(--navy); border-radius: 999px;
    cursor: pointer; transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .switch button.active { background: var(--navy); color: white; }

  .viewer { border: 1px solid #e3e1da; border-radius: 4px; overflow: hidden; }
  .viewer iframe {
    width: 100%; height: 88vh; min-height: 700px;
    border: none; display: block; background: #fafaf8;
  }
  .viewer-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; border-top: 1px solid #e3e1da; background: #fafaf8;
  }
  .viewer-footer span { font-size: 0.78rem; color: var(--muted); }
  .viewer-footer a { font-size: 0.85rem; font-weight: 600; color: var(--navy); text-decoration: none; }
  .viewer-footer a:hover { text-decoration: underline; }

  footer {
    text-align: center; padding: 24px 0 4px;
    font-size: 0.72rem; letter-spacing: 1.6px;
    text-transform: uppercase; color: rgba(255,255,255,0.55);
  }

  @media (max-width: 600px) {
    body { padding: 0; }
    .sheet { border-radius: 0; box-shadow: none; }
    .card { padding: 36px 22px 32px; }
    main { padding: 28px 22px 40px; }
    h1 { font-size: 1.5rem; }
    .band { right: -2%; width: 90px; }
    .viewer iframe { height: 72vh; min-height: 500px; }
    footer { padding: 18px 0 32px; }
  }
</style>
</head>
<body>

<div class="sheet">
  <section class="card">
    <div class="band"></div>
    <div class="card-inner">
      <div class="logo-row">
        <div class="logo-ring">
          <img src="logo.png" alt="" onerror="this.parentElement.style.display='none'">
        </div>
        <div class="org-name">Norges Arktiske&nbsp;Universitet</div>
      </div>

      <h1>Sebastian Sjøen-Tollaksvik</h1>
      <div class="rule"></div>

      <div class="info-list">
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span>+47 404 80 782</span>
        </div>
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
          <span>sesjo8217@uit.no</span>
        </div>
        <div class="info-row">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"/></svg>
          <span>Masterstudent, sivilingeniør KI</span>
        </div>
      </div>
    </div>
  </section>

  <main>
    <div class="switch" role="tablist" aria-label="Velg dokument">
      <button type="button" class="active" id="tab-no">Norsk CV</button>
      <button type="button" id="tab-en">English CV</button>
      <button type="button" id="tab-ref">Anbefalingsbrev</button>
    </div>

    <div class="viewer">
      <iframe id="cv-frame" src="cv-no.pdf" title="Dokument"></iframe>
      <div class="viewer-footer">
        <span>Vises ikke riktig på mobil?</span>
        <a id="cv-download" href="cv-no.pdf" download>Last ned PDF</a>
      </div>
    </div>
  </main>
</div>

<footer>UiT · Norges Arktiske Universitet</footer>

<script>
  const tabs = {
    no: document.getElementById('tab-no'),
    en: document.getElementById('tab-en'),
    ref: document.getElementById('tab-ref'),
  };
  const frame = document.getElementById('cv-frame');
  const download = document.getElementById('cv-download');

  const files = { no: 'cv-no.pdf', en: 'cv-en.pdf', ref: 'anbefaling.pdf' };
  const labels = { no: 'Last ned PDF', en: 'Download PDF', ref: 'Last ned anbefalingsbrev' };

  function setDoc(key) {
    frame.src = files[key];
    download.href = files[key];
    download.textContent = labels[key];
    Object.entries(tabs).forEach(([k, el]) => el.classList.toggle('active', k === key));
  }

  Object.entries(tabs).forEach(([key, el]) => el.addEventListener('click', () => setDoc(key)));
</script>

</body>
</html>
